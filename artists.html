<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="База художников уличного искусства - биографии, портфолио, лучшие работы">
    <title>Художники - StreetArt Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/artists.css">
</head>
<body class="page">
    <header class="header">
        <div class="header__container">
            <a href="index.html" class="header__logo">StreetArt Guide</a>
            <nav class="header__nav" aria-label="Основная навигация">
                <a href="index.html" class="header__nav-link">Галерея</a>
                <a href="artists.html" class="header__nav-link header__nav-link_active">Художники</a>
                <a href="planner.html" class="header__nav-link">Мой план (<span id="planCount">0</span>)</a>
                <a href="quiz.html" class="header__nav-link">Квиз</a>
                <a href="favorites.html" class="header__nav-link">Избранное (<span id="favCount">0</span>)</a>
            </nav>
            <button class="header__burger" aria-label="Открыть меню" id="burgerBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <main class="content">
        <div class="content__container content__container_full">
            <section class="artists-page" id="artistsPage">
                <h1 class="artists-page__title">Художники</h1>
                
                <div class="artists-page__filters">
                    <input type="text" class="artists-page__search" id="artistSearch" placeholder="Поиск по имени...">
                    <select class="artists-page__filter" id="styleFilter">
                        <option value="">Все стили</option>
                        <option value="Портрет">Портрет</option>
                        <option value="Абстракция">Абстракция</option>
                        <option value="Леттеринг">Леттеринг</option>
                        <option value="Характер">Характер</option>
                        <option value="Реализм">Реализм</option>
                    </select>
                </div>

                <div class="artists-grid" id="artistsGrid"></div>
            </section>

            <!-- Страница профиля художника -->
            <section class="artist-profile" id="artistProfile" style="display: none;">
                <button class="artist-profile__back" id="backToList">← Назад к списку</button>
                <div class="artist-profile__content" id="artistProfileContent"></div>
            </section>
        </div>
    </main>

    <div class="notification" id="notification"></div>

    <script src="js/data.js"></script>
    <script src="js/favorites.js"></script>
    <script src="js/planner.js"></script>
    <script src="js/modals.js"></script>
    <script src="js/artists.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
